# DigitalOcean App Platform spec.
# Create:  doctl apps create --spec .do/app.yaml
# Update:  doctl apps update <APP_ID> --spec .do/app.yaml
# Builds the Dockerfile (Astro frontend + Node server) and auto-deploys on push
# to main. The server serves the static frontend and the API on one port.
name: poll-blue
region: nyc
services:
  - name: poll-blue
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: NetWatchInc/poll.blue
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /status
    routes:
      - path: /
    envs:
      # --- non-secret runtime config ---
      - { key: ENV, scope: RUN_TIME, value: production }
      - { key: HOSTNAME, scope: RUN_TIME, value: poll.blue }
      - { key: PORT, scope: RUN_TIME, value: "8000" }
      - { key: PG_PORT, scope: RUN_TIME, value: "25060" }
      - { key: PG_SSL, scope: RUN_TIME, value: require }
      - { key: BSKY_HOST, scope: RUN_TIME, value: https://bsky.social }
      # --- set these encrypted in the DO dashboard / via doctl (kept out of git) ---
      - { key: PG_HOST, scope: RUN_TIME, type: SECRET }
      - { key: PG_DATABASE, scope: RUN_TIME, type: SECRET }
      - { key: PG_USERNAME, scope: RUN_TIME, type: SECRET }
      - { key: PG_PASSWORD, scope: RUN_TIME, type: SECRET }
      # Leave the BSKY_* secrets unset to keep the @-mention bot disabled.
      - { key: BSKY_USERNAME, scope: RUN_TIME, type: SECRET }
      - { key: BSKY_PASSWORD, scope: RUN_TIME, type: SECRET }
